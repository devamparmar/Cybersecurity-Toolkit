<!DOCTYPE html>
<html>
<head>
<title>Cybersecurity Toolkit</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

header{
    background:#1e293b;
    padding:30px;
    box-shadow:0 0 10px cyan;
}

.container{
    width:80%;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,255,255,0.3);
}

input{
    width:70%;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 20px;
    background:cyan;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00bcd4;
}

footer{
    margin-top:30px;
    padding:20px;
    background:#1e293b;
}
</style>

</head>
<body>

<header>
    <h1>🔐 Cybersecurity Toolkit</h1>
    <p>Password Strength Checker & URL Safety Checker</p>
</header>

<div class="container">

    <div class="card">
        <h2>🔑 Password Strength Checker</h2>
        <input type="password" id="password" placeholder="Enter Password">
        <br><br>
        <button onclick="checkPassword()">Check</button>
        <p id="passwordResult"></p>
    </div>

    <div class="card">
        <h2>🌐 URL Safety Checker</h2>
        <input type="text" id="url" placeholder="Enter URL">
        <br><br>
        <button onclick="checkURL()">Check</button>
        <p id="urlResult"></p>
    </div>

</div>

<footer>
    👨‍💻 Developed by Devam Parmar
</footer>

<script>

function checkPassword(){

let password=document.getElementById("password").value;

if(password.length<8){
document.getElementById("passwordResult").innerHTML="❌ Weak Password";
}
else if(password.length<12){
document.getElementById("passwordResult").innerHTML="⚠️ Medium Password";
}
else{
document.getElementById("passwordResult").innerHTML="✅ Strong Password";
}
}

function checkURL(){

let url=document.getElementById("url").value;

if(url.startsWith("https://")){
document.getElementById("urlResult").innerHTML="✅ Safe URL";
}
else{
document.getElementById("urlResult").innerHTML="⚠️ Suspicious URL";
}
}

</script>

</body>
</html>
